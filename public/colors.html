<style>
  @import url(https://fonts.googleapis.com/css?family=Carrois+Gothic+SC);
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    display: flex;
    flex-wrap: wrap;
    font-family: 'Carrois Gothic SC', sans-serif;
    background: #111;
  }

  .color-card {
    width: 12.5%; /* 8 columns wide */
    height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
    position: relative;
    font-size: 0.6rem;
    border: 1px solid rgba(0,0,0,0.05);
  }

  .color-card:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  
  .color-card::after {
    content: 'COPIED';
    position: absolute;
    background: rgba(0,0,0,0.7);
    padding: 4px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .color-card.copied::after { opacity: 1; }
</style>
</head>

  "pila-yellow-tint-950": "#fffff7",
  /* White */
  "white-base": "#ffffff",
  "white-shade-50": "#f2f2f2",
  "white-shade-100": "#e6e6e6",
  "white-shade-150": "#d9d9d9",
  "white-shade-200": "#cccccc",
  "white-shade-250": "#bfbfbf",
  "white-shade-300": "#b3b3b3",
  "white-shade-350": "#a6a6a6",
  "white-shade-400": "#999999",
  "white-shade-450": "#8c8c8c",
  "white-shade-500": "#808080",
  "white-shade-550": "#737373",
  "white-shade-600": "#666666",
  "white-shade-650": "#595959",
  "white-shade-700": "#4d4d4d",
  "white-shade-750": "#404040",
  "white-shade-800": "#333333",
  "white-shade-850": "#262626",
  "white-shade-900": "#1a1a1a",
  "white-shade-950": "#0d0d0d",
    };

  const myColors = Object.values(colorData);

  myColors.forEach(color => {
    const div = document.createElement('div');
    div.className = 'color-card';
    div.style.backgroundColor = color;
    div.innerHTML = `<span>${color}</span>`;
    
    // Auto-detect brightness
    const r = parseInt(color.slice(1,3), 16);
    const g = parseInt(color.slice(3,5), 16);
    const b = parseInt(color.slice(5,7), 16);
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    if (brightness > 155) div.style.color = '#000';

    div.onclick = () => {
      navigator.clipboard.writeText(color);
      div.classList.add('copied');
      setTimeout(() => div.classList.remove('copied'), 800);
    };

    document.body.appendChild(div);
  });
</script>

</body>
</html>
